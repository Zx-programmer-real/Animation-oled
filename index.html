<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLED Animation Studio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;500&display=swap');

    :root {
      --primary: #00ffcc;
      --primary-hover: #00e6b8;
      --bg: #09090b;
      --card-bg: #18181b;
      --border: #27272a;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #fff;
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 2rem;
      letter-spacing: -1px;
      text-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
    }
    h1 span { color: var(--primary); }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      height: fit-content;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .oled-icon {
      width: 40px; height: 40px; background: #000; border-radius: 6px; border: 1px solid #333; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
    }
    .oled-icon::after {
      content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; background: rgba(0, 255, 204, 0.1); border: 1px solid rgba(0, 255, 204, 0.2); color: var(--primary); font-size: 8px; font-weight: bold; display: flex; justify-content: center; align-items: center;
    }
    h2.settings-title .oled-icon::after { content: 'INP'; }
    h2.code-title .oled-icon::after { content: 'PROG'; font-size: 7px; }
    h2.preview-title .oled-icon { background: repeating-linear-gradient(0deg, #000, #000 2px, rgba(0, 255, 204, 0.1) 2px, rgba(0, 255, 204, 0.1) 4px); }
    h2.preview-title .oled-icon::after { display: none; }

    /* TABS */
    .tab-container { display: flex; background: #09090b; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 12px; background: transparent; color: var(--text-muted); border: none; cursor: pointer; font-weight: 800; font-size: 0.95rem; }
    .tab-btn.active { background: var(--primary); color: #000; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .control-group { margin-bottom: 20px; }
    .section-box { background: #09090b; border: 1px dashed #52525b; border-radius: 8px; padding: 15px; margin-top: 15px; }
    .section-box h3 { font-size: 0.9rem; color: var(--primary); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

    label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    input[type="file"], select, input[type="number"] { width: 100%; padding: 10px; background: #18181b; border: 1px solid var(--border); border-radius: 6px; color: #fff; }
    
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: #3f3f46; border-radius: 5px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; }

    /* PROGRESS BAR STYLE */
    .progress-container { width: 100%; height: 8px; background: #09090b; border-radius: 4px; margin-top: 10px; border: 1px solid var(--border); overflow: hidden; display: none; }
    .progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: width 0.2s; }

    .switch-group { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: #fff; }
    .switch-group input { width: 16px; height: 16px; accent-color: var(--primary); }

    button.action-btn { width: 100%; padding: 14px; background: #27272a; border: none; border-radius: 8px; color: #fff; font-weight: 800; font-size: 1rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
    button.action-btn.primary { background: var(--primary); color: #000; margin-top: 10px; }
    button.action-btn.primary:hover { background: var(--primary-hover); transform: translateY(-2px); }

    .status-badge { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; background: rgba(0, 255, 204, 0.1); border: 1px solid rgba(0, 255, 204, 0.2); color: var(--primary); border-radius: 8px; font-size: 0.85rem; font-weight: 600; margin-top: 15px; }

    .oled-bezel { background: #000; padding: 15px; border-radius: 12px; border: 2px solid #27272a; position: relative; display: flex; justify-content: center; align-items: center; min-height: 150px; }
    .oled-label { position: absolute; top: -10px; left: 15px; background: var(--card-bg); padding: 0 5px; font-size: 10px; color: #52525b; font-weight: bold; }
    canvas { image-rendering: pixelated; background: #000; border-radius: 2px; transform: scale(2); transform-origin: center; margin: 30px 0; }
    
    textarea { width: 100%; height: 300px; background: #0d0d0d; color: #4ade80; border: 1px solid var(--border); border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 13px; padding: 15px; resize: vertical; margin-top: 10px; }
  </style>
</head>
<body>

  <h1>OLED <span>Animation Studio</span></h1>

  <div class="container">
    <div class="card">
      <h2 class="settings-title">⚙️ Input Media <div class="oled-icon"></div></h2>

      <div class="tab-container">
        <button id="tabVideoBtn" class="tab-btn active" onclick="switchTab('video')">MP4 Video</button>
        <button id="tabImageBtn" class="tab-btn" onclick="switchTab('image')">Image Frames</button>
      </div>

      <div id="videoContent" class="tab-content active">
        <div class="control-group">
          <label>Upload Video (.mp4 / .webm)</label>
          <input type="file" id="uploadVideo" accept="video/*" />
          <div id="videoProgress" class="progress-container">
            <div id="videoProgressBar" class="progress-bar"></div>
          </div>
        </div>
        <div class="control-group">
          <label>Target FPS Ekstrak:</label>
          <input type="number" id="videoFps" value="10" />
        </div>
      </div>

      <div id="imageContent" class="tab-content">
        <div class="control-group">
          <label>Upload Image Frames (Multiple)</label>
          <input type="file" id="uploadImages" accept="image/*" multiple />
        </div>
      </div>

      <div class="control-group">
        <label>Kecepatan Animasi Preview (ms):</label>
        <input type="number" id="speed" value="80" />
      </div>

      <button id="generateBtn" class="action-btn primary">⚡ GENERATE C++ CODE</button>
      <div id="status" class="status-badge" style="display: none;"></div>
    </div>

    <div class="card">
      <h2 class="preview-title">📺 Live Preview <div class="oled-icon"></div></h2>
      
      <div class="oled-bezel">
        <span class="oled-label" id="bezelLabel">SSD1306 128x64</span>
        <canvas id="oled" width="128" height="64"></canvas>
      </div>

      <div class="section-box">
        <h3>
          🖼️ Penyesuaian Visual
          <label class="switch-group">
            <input type="checkbox" id="invert"> Invert Color
          </label>
        </h3>
        
        <div class="control-group">
          <label>Resolusi OLED Hardware:</label>
          <select id="oledType">
            <option value="128x64">128×64 (0.96" Standard)</option>
            <option value="128x32">128×32 (0.91" Narrow)</option>
            <option value="64x48">64×48 (0.66" Mini)</option>
          </select>
        </div>

        <div class="control-group">
          <label id="thresholdLabel">Threshold (Kontras): 127</label>
          <input type="range" id="threshold" min="0" max="255" value="127" />
        </div>

        <div class="control-group">
          <label id="scaleLabel">Scale / Zoom: 100%</label>
          <input type="range" id="scale" min="10" max="255" value="100" />
        </div>

        <div style="display: flex; gap: 15px;">
          <div style="flex: 1;">
            <label id="xOffsetLabel">X Offset: 0px</label>
            <input type="range" id="xOffset" min="-128" max="128" value="0" />
          </div>
          <div style="flex: 1;">
            <label id="yOffsetLabel">Y Offset: 0px</label>
            <input type="range" id="yOffset" min="-64" max="64" value="0" />
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h2 class="code-title">💻 C++ PROGMEM Output <div class="oled-icon"></div></h2>
      <textarea id="output" readonly placeholder="// Kode hexa akan muncul di sini..."></textarea>
      <button id="copyBtn" class="action-btn" onclick="copyToClipboard()">📋 COPY CODE TO CLIPBOARD</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('oled');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    const uploadImagesBtn = document.getElementById('uploadImages');
    const uploadVideoBtn = document.getElementById('uploadVideo');
    const videoProgress = document.getElementById('videoProgress');
    const videoProgressBar = document.getElementById('videoProgressBar');
    const videoFpsInput = document.getElementById('videoFps');
    const oledType = document.getElementById('oledType');
    const bezelLabel = document.getElementById('bezelLabel');
    const scaleInput = document.getElementById('scale');
    const xOffsetInput = document.getElementById('xOffset');
    const yOffsetInput = document.getElementById('yOffset');
    const thresholdInput = document.getElementById('threshold');
    const invertInput = document.getElementById('invert');
    const speedInput = document.getElementById('speed');
    const output = document.getElementById('output');
    const statusText = document.getElementById('status');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');

    let framesData = []; 
    let animationInterval = null;
    let currentFrameIdx = 0;
    let canvasW = 128;
    let canvasH = 64;

    function switchTab(tabName) {
      if(animationInterval) clearInterval(animationInterval);
      framesData = []; ctx.clearRect(0, 0, canvasW, canvasH);
      statusText.style.display = 'none';
      videoProgress.style.display = 'none';
      document.getElementById('tabVideoBtn').classList.toggle('active', tabName === 'video');
      document.getElementById('tabImageBtn').classList.toggle('active', tabName === 'image');
      document.getElementById('videoContent').classList.toggle('active', tabName === 'video');
      document.getElementById('imageContent').classList.toggle('active', tabName === 'image');
    }

    oledType.addEventListener('change', (e) => {
      const [w, h] = e.target.value.split('x').map(Number);
      canvasW = w; canvasH = h;
      canvas.width = w; canvas.height = h;
      bezelLabel.innerText = `SSD1306 ${w}x${h}`;
      xOffsetInput.min = -w; xOffsetInput.max = w;
      yOffsetInput.min = -h; yOffsetInput.max = h;
      if (framesData.length > 0) renderPreview();
    });

    let isSliderInteracting = false;
    function pause() { isSliderInteracting = true; if(animationInterval) clearInterval(animationInterval); }
    function resume() { isSliderInteracting = false; if (framesData.length > 0) startAnimation(); }

    [thresholdInput, scaleInput, xOffsetInput, yOffsetInput].forEach(el => {
      el.addEventListener('mousedown', pause); el.addEventListener('touchstart', pause);
      el.addEventListener('mouseup', resume); el.addEventListener('touchend', resume);
      el.addEventListener('input', () => {
          document.getElementById('thresholdLabel').innerText = `Threshold: ${thresholdInput.value}`;
          document.getElementById('scaleLabel').innerText = `Scale: ${scaleInput.value}%`;
          document.getElementById('xOffsetLabel').innerText = `X Offset: ${xOffsetInput.value}px`;
          document.getElementById('yOffsetLabel').innerText = `Y Offset: ${yOffsetInput.value}px`;
          if (framesData.length > 0) renderPreview();
      });
    });

    invertInput.addEventListener('change', () => { if (framesData.length > 0) renderPreview(); });

    uploadImagesBtn.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;
      framesData = []; showStatus("⏳ Processing Images...");
      const promises = files.map(file => new Promise(res => {
        const reader = new FileReader();
        reader.onload = (ev) => { const img = new Image(); img.onload = () => res({img}); img.src = ev.target.result; };
        reader.readAsDataURL(file);
      }));
      framesData = await Promise.all(promises);
      showStatus(`✅ ${framesData.length} Frames loaded.`); startAnimation();
    });

    uploadVideoBtn.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      framesData = []; 
      videoProgress.style.display = 'block';
      videoProgressBar.style.width = '0%';
      showStatus("🎥 Waking up video...");
      
      const targetFps = parseInt(videoFpsInput.value) || 10;
      const step = 1 / targetFps;
      const video = document.createElement('video');
      video.setAttribute('playsinline', 'true'); video.muted = true; video.style.display = "none";
      document.body.appendChild(video); video.src = URL.createObjectURL(file);
      const tempCanvas = document.createElement('canvas'); const tempCtx = tempCanvas.getContext('2d');
      try { await video.play(); video.pause(); } catch (err) {}
      
      video.addEventListener('loadeddata', () => {
        let currentTime = 0.001;
        video.addEventListener('seeked', async () => {
          tempCanvas.width = video.videoWidth; tempCanvas.height = video.videoHeight;
          tempCtx.drawImage(video, 0, 0);
          const img = new Image(); img.src = tempCanvas.toDataURL('image/jpeg', 1.0);
          await new Promise(r => img.onload = r); framesData.push({img});
          
          currentTime += step;
          const progress = Math.floor((currentTime / video.duration) * 100);
          videoProgressBar.style.width = Math.min(progress, 100) + '%';
          
          if (currentTime <= video.duration && framesData.length < 200) {
            showStatus(`⏳ Extracting: ${Math.min(progress, 100)}% (${framesData.length} f)`);
            video.currentTime = currentTime;
          } else {
            videoProgressBar.style.width = '100%';
            showStatus(`✅ Sukses! ${framesData.length} Frame diekstrak.`); 
            document.body.removeChild(video);
            speedInput.value = Math.floor(1000/targetFps); 
            startAnimation();
            setTimeout(() => { videoProgress.style.display = 'none'; }, 1000);
          }
        });
        video.currentTime = currentTime;
      });
    });

    function drawBitmapKustom(context, source, width, height) {
      context.fillStyle = "black"; context.fillRect(0, 0, width, height);
      const scale = parseInt(scaleInput.value) / 100;
      const xOff = parseInt(xOffsetInput.value); const yOff = parseInt(yOffsetInput.value);
      const baseScale = Math.min(width / source.width, height / source.height);
      const finalScale = baseScale * scale;
      const dWidth = source.width * finalScale; const dHeight = source.height * finalScale;
      const dx = (width - dWidth) / 2 + xOff; const dy = (height - dHeight) / 2 + yOff;
      context.drawImage(source, dx, dy, dWidth, dHeight);
    }

    function renderPreview() { if (framesData.length === 0) return; drawToCanvas(framesData[currentFrameIdx].img); }

    function drawToCanvas(image) {
      drawBitmapKustom(ctx, image, canvasW, canvasH);
      const imageData = ctx.getImageData(0, 0, canvasW, canvasH);
      const data = imageData.data;
      const threshold = parseInt(thresholdInput.value);
      const invert = invertInput.checked;
      for (let i = 0; i < data.length; i += 4) {
        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
        let val = avg > threshold ? 255 : 0;
        if (invert) val = 255 - val;
        data[i] = val; data[i + 1] = val; data[i + 2] = val;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function startAnimation() {
      if (animationInterval) clearInterval(animationInterval);
      animationInterval = setInterval(() => { if (framesData.length === 0 || isSliderInteracting) return; renderPreview(); currentFrameIdx = (currentFrameIdx + 1) % framesData.length; }, parseInt(speedInput.value));
    }

    generateBtn.addEventListener('click', () => {
      if (framesData.length === 0) return;
      showStatus("⏳ Generating C++ Code...");
      setTimeout(() => {
        let cppCode = `// ==========================================\n// Monochromatic OLED Animation Array\n// Resolution: ${canvasW}x${canvasH} | Total Frames: ${framesData.length}\n// ==========================================\n\n#include <pgmspace.h>\n\nconst int FRAME_COUNT = ${framesData.length};\nconst int FRAME_WIDTH = ${canvasW};\nconst int FRAME_HEIGHT = ${canvasH};\n\n`;
        let arrayNames = [];
        framesData.forEach((frame, idx) => {
          drawBitmapKustom(ctx, frame.img, canvasW, canvasH);
          const imgData = ctx.getImageData(0, 0, canvasW, canvasH).data;
          const threshold = parseInt(thresholdInput.value);
          const varName = `frame_${idx}`; arrayNames.push(varName);
          cppCode += `const unsigned char ${varName} [] PROGMEM = {\n`;
          let bytes = [];
          for (let page = 0; page < canvasH / 8; page++) {
            for (let x = 0; x < canvasW; x++) {
              let byte = 0;
              for (let bit = 0; bit < 8; bit++) {
                const y = (page * 8) + bit; const pos = (y * canvasW + x) * 4;
                const avg = (imgData[pos] + imgData[pos+1] + imgData[pos+2]) / 3;
                let val = avg > threshold; if (invertInput.checked) val = !val;
                if (val) byte |= (1 << bit);
              }
              bytes.push("0x" + byte.toString(16).padStart(2, '0').toUpperCase());
            }
          }
          cppCode += "  " + bytes.join(", ") + "\n};\n\n";
        });
        cppCode += `const unsigned char* const animation_frames[] PROGMEM = {\n  ${arrayNames.join(", ")}\n};\n`;
        output.value = cppCode; showStatus("✨ Kode Berhasil Dibuat!");
      }, 50);
    });

    function copyToClipboard() {
      if (!output.value) return;
      output.select();
      document.execCommand('copy');
      const originalText = copyBtn.innerText;
      copyBtn.innerText = "✅ TERSALIN KE CLIPBOARD!";
      setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
    }
    
    function showStatus(msg) { statusText.style.display = 'flex'; statusText.innerText = msg; }
  </script>
</body>
</html>
