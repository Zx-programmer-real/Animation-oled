<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OLED Animation Studio — Fixed Pro by Zx</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Fira+Code:wght@400;500&family=Syne:wght@700;800&display=swap');

    :root {
      --primary: #00ffcc;
      --bg: #09090b;
      --card-bg: #111114;
      --border: #27272a;
      --text: #e4e4e7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    
    h1 { text-align: center; font-family: 'Syne', sans-serif; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
    h1 span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }

    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--primary); text-transform: uppercase; border-left: 4px solid var(--primary); padding-left: 10px; }

    .tab-bar { display: flex; background: #000; border-radius: 6px; margin-bottom: 15px; padding: 3px; }
    .tab-btn { flex: 1; padding: 8px; background: transparent; border: none; color: #555; cursor: pointer; font-weight: bold; border-radius: 4px; }
    .tab-btn.active { background: var(--primary); color: #000; }

    .ctrl-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
    input, select, textarea { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; font-family: inherit; }
    
    input[type="range"] { -webkit-appearance: none; height: 4px; background: #333; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: var(--primary); border-radius: 50%; cursor: pointer; }

    .oled-bezel { background: #000; padding: 20px; border-radius: 8px; border: 2px solid #222; display: flex; justify-content: center; align-items: center; min-height: 160px; margin: 10px 0; }
    canvas { background: #000; image-rendering: pixelated; transform: scale(2.5); border: 1px solid #111; }

    .status { font-size: 0.8rem; padding: 10px; background: rgba(0,255,204,0.1); color: var(--primary); border-radius: 6px; margin-top: 10px; display: none; }
    .action-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
    .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,204,0.3); }

    textarea { font-family: 'Fira Code', monospace; font-size: 11px; height: 250px; color: #4ade80; }

    /* Progress bar */
    .p-bar { height: 4px; background: #333; border-radius: 2px; margin-top: 10px; overflow: hidden; display: none; }
    .p-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.1s; }
  </style>
</head>
<body>

  <h1>OLED <span>ANIMATION STUDIO</span></h1>

  <div class="container">
    <div class="card">
      <h2>📥 Input Media</h2>
      <div class="tab-bar">
        <button id="vTab" class="tab-btn active" onclick="setTab('video')">VIDEO</button>
        <button id="iTab" class="tab-btn" onclick="setTab('image')">IMAGES</button>
      </div>

      <div id="vBox">
        <div class="ctrl-group">
          <label>Video File (.mp4)</label>
          <input type="file" id="upVid" accept="video/*">
          <div class="p-bar" id="pBar"><div class="p-fill" id="pFill"></div></div>
        </div>
        <div class="ctrl-group">
          <label>Target FPS (5 - 15)</label>
          <input type="number" id="fps" value="10">
        </div>
      </div>

      <div id="iBox" style="display:none">
        <div class="ctrl-group">
          <label>Images (Multiple)</label>
          <input type="file" id="upImg" accept="image/*" multiple>
        </div>
      </div>

      <div class="ctrl-group">
        <label>Preview Speed (ms)</label>
        <input type="number" id="speed" value="80">
      </div>

      <button class="action-btn" onclick="generateCode()">⚡ GENERATE C++ CODE</button>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <h2>📺 Live Preview</h2>
      <div class="oled-bezel">
        <canvas id="oled" width="128" height="64"></canvas>
      </div>
      
      <div style="background:#000; padding:15px; border-radius:8px; border: 1px solid #222">
        <div class="ctrl-group">
          <label>OLED Type</label>
          <select id="res">
            <option value="128x64">128x64 Standard</option>
            <option value="128x32">128x32 Narrow</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label id="lThr">Threshold: 127</label>
          <input type="range" id="thr" min="0" max="255" value="127">
        </div>
        <div class="ctrl-group">
          <label id="lSc">Zoom: 100%</label>
          <input type="range" id="sc" min="10" max="255" value="100">
        </div>
        <div style="display:flex; gap:10px">
          <div style="flex:1">
            <label>X Offset</label>
            <input type="range" id="ox" min="-64" max="64" value="0">
          </div>
          <div style="flex:1">
            <label>Y Offset</label>
            <input type="range" id="oy" min="-32" max="32" value="0">
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="grid-column: 1/-1">
      <h2>💻 C++ PROGMEM OUTPUT</h2>
      <textarea id="out" readonly></textarea>
      <button class="action-btn" style="margin-top:10px; background:#27272a; color:#fff" onclick="copy()">📋 COPY TO CLIPBOARD</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('oled');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let frames = [];
    let curIdx = 0;
    let loop = null;
    let cw = 128, ch = 64;

    function setTab(t) {
      document.getElementById('vBox').style.display = t==='video'?'block':'none';
      document.getElementById('iBox').style.display = t==='image'?'block':'none';
      document.getElementById('vTab').className = t==='video'?'tab-btn active':'tab-btn';
      document.getElementById('iTab').className = t==='image'?'tab-btn active':'tab-btn';
    }

    // --- LOGIKA SETTING ---
    document.getElementById('res').onchange = (e) => {
      [cw, ch] = e.target.value.split('x').map(Number);
      canvas.width = cw; canvas.height = ch;
    };
    document.getElementById('thr').oninput = (e) => document.getElementById('lThr').innerText = `Threshold: ${e.target.value}`;
    document.getElementById('sc').oninput = (e) => document.getElementById('lSc').innerText = `Zoom: ${e.target.value}%`;

    // --- VIDEO ENGINE ---
    document.getElementById('upVid').onchange = async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      frames = [];
      document.getElementById('pBar').style.display = 'block';
      const v = document.createElement('video');
      v.src = URL.createObjectURL(file);
      await v.play(); v.pause();

      const fps = parseInt(document.getElementById('fps').value);
      const step = 1/fps;
      const tmp = document.createElement('canvas');
      const tctx = tmp.getContext('2d');
      // Downscale agar enteng
      tmp.width = 128; tmp.height = 64; 

      for(let t=0; t<v.duration; t+=step) {
        v.currentTime = t;
        await new Promise(r => v.onseeked = r);
        tctx.drawImage(v, 0, 0, 128, 64);
        const img = new Image();
        img.src = tmp.toDataURL('image/jpeg', 0.5);
        await new Promise(r => img.onload = r);
        frames.push(img);
        document.getElementById('pFill').style.width = (t/v.duration*100)+'%';
      }
      play();
      document.getElementById('pBar').style.display = 'none';
      document.getElementById('status').style.display = 'block';
      document.getElementById('status').innerText = `✅ ${frames.length} Frame Video Dimuat!`;
    };

    // --- IMAGE ENGINE ---
    document.getElementById('upImg').onchange = async (e) => {
      frames = [];
      for(let f of e.target.files) {
        const img = new Image();
        img.src = URL.createObjectURL(f);
        await new Promise(r => img.onload = r);
        frames.push(img);
      }
      play();
    };

    function play() {
      if(loop) clearInterval(loop);
      loop = setInterval(() => {
        if(!frames.length) return;
        draw(frames[curIdx]);
        curIdx = (curIdx+1)%frames.length;
      }, document.getElementById('speed').value);
    }

    function draw(img) {
      ctx.fillStyle = "black";
      ctx.fillRect(0,0,cw,ch);
      const s = document.getElementById('sc').value / 100;
      const ox = parseInt(document.getElementById('ox').value);
      const oy = parseInt(document.getElementById('oy').value);
      
      const aspect = Math.min(cw/img.width, ch/img.height) * s;
      const dw = img.width * aspect;
      const dh = img.height * aspect;
      ctx.drawImage(img, (cw-dw)/2 + ox, (ch-dh)/2 + oy, dw, dh);

      const id = ctx.getImageData(0,0,cw,ch);
      const d = id.data;
      const thr = document.getElementById('thr').value;
      
      for(let i=0; i<d.length; i+=4) {
        const gray = (d[i]+d[i+1]+d[i+2])/3;
        const v = gray > thr ? 255 : 0;
        d[i]=d[i+1]=d[i+2]=v;
      }
      ctx.putImageData(id, 0, 0);
    }

    // --- GENERATOR: FORMAT HORIZONTAL (ADAFRUIT GFX) ---
    function generateCode() {
      if(!frames.length) return;
      let code = `// OLED Animation Array\n// Resolution: ${cw}x${ch} | Frames: ${frames.length}\n\n#include <pgmspace.h>\n\nconst int FRAME_COUNT = ${frames.length};\nconst int FRAME_WIDTH = ${cw};\nconst int FRAME_HEIGHT = ${ch};\n\n`;
      let names = [];

      frames.forEach((f, i) => {
        draw(f);
        const d = ctx.getImageData(0,0,cw,ch).data;
        const name = `frame_${i}`;
        names.push(name);
        code += `const unsigned char ${name}[] PROGMEM = {\n`;
        
        let bytes = [];
        // Loop Baris (Y) dulu baru Kolom (X) - Ini format Horizontal
        for(let y=0; y<ch; y++) {
          for(let x=0; x<cw; x+=8) {
            let byte = 0;
            for(let b=0; b<8; b++) {
              const idx = ((y * cw) + (x + b)) * 4;
              if(d[idx] > 127) byte |= (1 << (7 - b)); // Bit paling kiri adalah MSB
            }
            bytes.push("0x" + byte.toString(16).padStart(2,'0').toUpperCase());
          }
        }

        // Pecah jadi 16 kolom agar IDE tidak lag
        for(let j=0; j<bytes.length; j+=16) {
          code += "  " + bytes.slice(j, j+16).join(", ") + ",\n";
        }
        code += "};\n\n";
      });

      code += `const unsigned char* const animation_frames[] PROGMEM = {\n  ${names.join(", ")}\n};\n`;
      document.getElementById('out').value = code;
      document.getElementById('status').innerText = "✨ KODE C++ BERHASIL DIBUAT!";
    }

    function copy() {
      const t = document.getElementById('out');
      t.select(); document.execCommand('copy');
      alert("Tersalin! Paste ke Arduino IDE sekarang.");
    }
  </script>
</body>
</html>
